name: Feature
description: Define a product change and its acceptance criteria.
title: "[Feature] "
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Who has the problem, and what outcome is blocked?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: State a measurable result.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List observable conditions for completion.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Security, data, and rollout notes
